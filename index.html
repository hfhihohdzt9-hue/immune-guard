<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>&#20813;&#30123;&#23567;&#21355;&#22763;</title>
  <style>
    :root{--bg1:#f3fbf7;--bg2:#e5f7ee;--card:rgba(255,255,255,.94);--p:#1f9d6d;--t:#16332a;--st:#5a766d;--l:#d7ebe2;--ub:#1f9d6d;--ab:#f7fffb;--sd:0 14px 40px rgba(23,87,61,.12);--rx:24px;--rl:18px}
    *{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;color:var(--t);min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));display:flex;justify-content:center;align-items:center;padding:18px}.app{width:100%;max-width:430px;height:min(90vh,820px);background:var(--card);border:1px solid rgba(255,255,255,.75);box-shadow:var(--sd);border-radius:var(--rx);overflow:hidden;display:flex;flex-direction:column}.header{padding:22px 20px 14px;border-bottom:1px solid var(--l);background:rgba(255,255,255,.9)}.title{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#28b57d,#169864);display:grid;place-items:center;color:#fff;font-size:22px}.header h1{margin:0;font-size:24px}.header p{margin:8px 0 0 56px;color:var(--st);font-size:13px;line-height:1.6}.chat{flex:1;overflow-y:auto;padding:18px 14px}.msg{display:flex;gap:10px;margin-bottom:16px}.user{flex-direction:row-reverse}.av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:18px;flex-shrink:0}.ai .av{background:#dff6ea}.user .av{background:var(--ub);color:#fff}.wrap{max-width:80%;display:flex;flex-direction:column;gap:6px}.name{font-size:12px;color:var(--st);padding:0 4px}.bubble{border-radius:var(--rl);padding:12px 14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}.ai .bubble{background:var(--ab);border:1px solid var(--l);border-top-left-radius:6px}.user .bubble{background:var(--ub);color:#fff;border-top-right-radius:6px}.input{border-top:1px solid var(--l);padding:14px;background:rgba(255,255,255,.92)}.box{display:flex;gap:10px;background:#fff;border:1px solid var(--l);border-radius:18px;padding:10px}.box input{flex:1;border:none;outline:none;font-size:14px;background:transparent}.btn{border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#24b17b,#16885c);color:#fff;padding:11px 16px}.tips{margin-top:10px;font-size:12px;color:var(--st);text-align:center;line-height:1.6}@media (max-width:480px){body{padding:0}.app{height:100vh;border-radius:0;max-width:100%}}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title"><div class="logo">&#128737;</div><h1>&#20813;&#30123;&#23567;&#21355;&#22763;</h1></div>
    <p>&#32431;&#31163;&#32447;&#29256;&#20581;&#24247;&#38382;&#31572;&#21161;&#25163; · &#30452;&#25509;&#21457;&#36865; HTML &#25991;&#20214;&#21363;&#21487;&#20351;&#29992;</p>
  </div>
  <main class="chat" id="chat"></main>
  <div class="input">
    <div class="box"><input id="q" type="text" maxlength="180" placeholder="&#35831;&#36755;&#20837;&#38382;&#39064;&#65292;&#20363;&#22914;&#65306;&#35831;&#32473;&#23567;&#26126;&#20570;&#36816;&#21160;&#21608;&#35745;&#21010;"><button class="btn" id="send">&#21457;&#36865;</button></div>
    <div class="tips">&#21487;&#25552;&#38382;&#65306;&#20813;&#30123;&#12289;&#30123;&#33495;&#12289;&#30561;&#30496;&#12289;&#39278;&#39135;&#12289;&#36816;&#21160;&#12289;&#24863;&#20882;&#39044;&#38450;&#12289;&#35838;&#22530;&#24635;&#32467;&#12289;&#23567;&#26126;&#36816;&#21160;&#35745;&#21010;</div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id),chat=$("chat"),q=$("q"),send=$("send");
const T={ai:"\u514d\u75ab\u5c0f\u536b\u58eb",me:"\u6211",think:"\u6b63\u5728\u601d\u8003..."};
const openMsg="\u4f60\u597d\uff0c\u6211\u662f\u514d\u75ab\u5c0f\u536b\u58eb\u3002\n\u6211\u73b0\u5728\u662f\u7eaf\u79bb\u7ebf\u7248\u672c\uff0c\u4e0d\u9700\u8981\u8fde\u63a5\u4efb\u4f55\u540e\u7aef\u63a5\u53e3\u3002\n\u4f60\u53ef\u4ee5\u95ee\u6211\u514d\u75ab\u3001\u75ab\u82d7\u3001\u7761\u7720\u3001\u996e\u98df\u3001\u8fd0\u52a8\u3001\u611f\u5192\u9884\u9632\uff0c\u4e5f\u53ef\u4ee5\u8ba9\u6211\u4e3a\u5c0f\u660e\u751f\u6210\u4e13\u5c5e\u8fd0\u52a8\u5468\u8ba1\u5212\u3002";
const xPlan="\u5c0f\u660e\u4e13\u5c5e\u8fd0\u52a8\u5468\u8ba1\u5212\n\n\u9002\u7528\u5bf9\u8c61\uff1a\u5e38\u5e74\u4e0d\u7231\u8fd0\u52a8\u3001\u7ecf\u5e38\u751f\u75c5\u7684\u4e2d\u5b66\u751f\u5c0f\u660e\u3002\n\u539f\u5219\uff1a\u5148\u517b\u6210\u4e60\u60ef\uff0c\u518d\u9010\u6b65\u589e\u5f3a\u4f53\u80fd\uff1b\u5b89\u5168\u3001\u53ef\u575a\u6301\u3001\u4e0d\u8fc7\u5ea6\u75b2\u52b3\u3002\n\n\u5468\u4e00 \u8f7b\u677e\u542f\u52a8\u65e5\n- \u653e\u5b66\u540e\u5feb\u8d7015\u5206\u949f\n- \u624b\u81c2\u3001\u80a9\u8180\u548c\u811a\u8e1d\u6d3b\u52a8\u54041\u5206\u949f\n- \u7761\u524d\u62c9\u4f385\u5206\u949f\n\n\u5468\u4e8c \u8f7b\u6709\u6c27\u65e5\n- \u70ed\u8eab5\u5206\u949f\n- \u6162\u8dd18\u5206\u949f\u6216\u8df3\u7ef35\u5206\u949f\n- \u6df1\u8e728\u6b21\u00d72\u7ec4\n\n\u5468\u4e09 \u6062\u590d\u5de9\u56fa\u65e5\n- \u665a\u996d\u540e\u6563\u6b6520\u5206\u949f\n- \u9760\u5899\u4fef\u5367\u64918\u6b21\u00d72\u7ec4\n- \u62c9\u4f385\u5206\u949f\n\n\u5468\u56db \u4f53\u80fd\u63d0\u5347\u65e5\n- \u5feb\u8d702\u5206\u949f+\u6162\u8dd11\u5206\u949f\uff0c\u5faa\u73af6\u7ec4\n- \u5f00\u5408\u8df315\u6b21\u00d72\u7ec4\n\n\u5468\u4e94 \u8da3\u5473\u8fd0\u52a8\u65e5\n- \u7fbd\u6bdb\u7403\u3001\u62cd\u7403\u3001\u9a91\u8f66\u3001\u8df3\u7ef3\u7b4930\u5206\u949f\n- \u5982\u679c\u8f83\u7d2f\uff0c\u53ef\u6539\u4e3a\u5feb\u8d7020\u5206\u949f\n\n\u5468\u516d \u6237\u5916\u9633\u5149\u65e5\n- \u4e0a\u5348\u6237\u5916\u6d3b\u52a830\u523040\u5206\u949f\n- \u6ce8\u610f\u8865\u6c34\u548c\u4f11\u606f\n\n\u5468\u65e5 \u6062\u590d\u6574\u7406\u65e5\n- \u6563\u6b6515\u5206\u949f\u6216\u8212\u5c55\u64cd10\u5206\u949f\n- \u56de\u987e\u672c\u5468\u5b8c\u6210\u60c5\u51b5\n\n\u6ce8\u610f\uff1a\n1. \u6bcf\u6b21\u8fd0\u52a8\u524d\u70ed\u8eab3\u52305\u5206\u949f\uff0c\u8fd0\u52a8\u540e\u62c9\u4f383\u52305\u5206\u949f\uff1b\n2. \u524d\u4e24\u5468\u4e0d\u8981\u8fde\u7eed\u9ad8\u5f3a\u5ea6\u8bad\u7ec3\uff1b\n3. \u4fdd\u8bc1\u65e9\u7761\u3001\u6309\u65f6\u5403\u996d\u3001\u5c11\u559d\u542b\u7cd6\u996e\u6599\uff1b\n4. \u82e5\u51fa\u73b0\u5934\u6655\u3001\u80f8\u95f7\u3001\u53d1\u70ed\u6216\u660e\u663e\u4e0d\u9002\uff0c\u5e94\u6682\u505c\u8fd0\u52a8\u5e76\u544a\u8bc9\u5bb6\u957f\u8001\u5e08\u3002";
function add(role,text){const d=document.createElement("div");d.className=`msg ${role}`;d.innerHTML=`<div class="av">${role==="ai"?"&#129302;":"&#128578;"}</div><div class="wrap"><div class="name">${role==="ai"?T.ai:T.me}</div><div class="bubble"></div></div>`;d.querySelector(".bubble").textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function typing(){const d=document.createElement("div");d.className="msg ai";d.id="tp";d.innerHTML=`<div class="av">&#129302;</div><div class="wrap"><div class="name">${T.ai}</div><div class="bubble">${T.think}</div></div>`;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function rm(){const t=$("tp");if(t)t.remove()}function norm(s){return s.toLowerCase().replace(/\s+/g,"").replace(/[???!?,????;?:'"??()??\[\]<>??]/g,"")}
function reply(qs){const t=norm(qs);if(t.includes("\u5c0f\u660e")||(t.includes("\u8ba1\u5212")&&t.includes("\u8fd0\u52a8")))return xPlan;if(t.includes("\u514d\u75ab\u529b")&&(t.includes("\u63d0\u9ad8")||t.includes("\u589e\u5f3a")||t.includes("\u63d0\u5347")))return "\u63d0\u9ad8\u514d\u75ab\u529b\u66f4\u91cd\u8981\u7684\u662f\u957f\u671f\u597d\u4e60\u60ef\uff1a\u7761\u7720\u5145\u8db3\u3001\u996e\u98df\u5747\u8861\u3001\u575a\u6301\u8fd0\u52a8\u3001\u5fc3\u60c5\u7a33\u5b9a\u3001\u52e4\u6d17\u624b\u548c\u4fdd\u6301\u73af\u5883\u901a\u98ce\u3002";if(t.includes("\u514d\u75ab"))return "\u514d\u75ab\u662f\u4eba\u4f53\u8bc6\u522b\u81ea\u5df1\u548c\u5916\u6765\u6709\u5bb3\u7269\u7684\u4e00\u79cd\u4fdd\u62a4\u80fd\u529b\u3002\u4f60\u53ef\u4ee5\u628a\u514d\u75ab\u7cfb\u7edf\u7406\u89e3\u6210\u8eab\u4f53\u91cc\u7684\u9632\u62a4\u961f\u3002";if(t.includes("\u75ab\u82d7"))return "\u75ab\u82d7\u80fd\u5e2e\u52a9\u8eab\u4f53\u63d0\u524d\u8ba4\u8bc6\u67d0\u4e9b\u75c5\u539f\u4f53\uff0c\u8ba9\u514d\u75ab\u7cfb\u7edf\u5f62\u6210\u8bb0\u5fc6\u3002";if(t.includes("\u611f\u5192"))return "\u9884\u9632\u611f\u5192\u8981\u4ece\u751f\u6d3b\u7ec6\u8282\u505a\u8d77\uff1a\u52e4\u6d17\u624b\u3001\u6ce8\u610f\u901a\u98ce\u3001\u6839\u636e\u5929\u6c14\u589e\u51cf\u8863\u7269\u3001\u4fdd\u8bc1\u7761\u7720\u3001\u5747\u8861\u996e\u98df\u3001\u9002\u91cf\u8fd0\u52a8\u3002";if(t.includes("\u8fd0\u52a8"))return "\u8fd0\u52a8\u7684\u597d\u5904\u5f88\u591a\uff0c\u6bd4\u5982\u589e\u5f3a\u5fc3\u80ba\u529f\u80fd\u3001\u6539\u5584\u4f53\u529b\u3001\u5e2e\u52a9\u7761\u7720\u3001\u7f13\u89e3\u538b\u529b\u3002\u4e2d\u5b66\u751f\u53ef\u4ee5\u4ece\u6bcf\u592915\u523030\u5206\u949f\u5f00\u59cb\u3002";if(t.includes("\u7761\u7720")||t.includes("\u71ac\u591c"))return "\u7761\u7720\u662f\u8eab\u4f53\u6062\u590d\u7684\u91cd\u8981\u65f6\u95f4\u3002\u957f\u671f\u71ac\u591c\u4f1a\u5f71\u54cd\u5b66\u4e60\u72b6\u6001\u548c\u8eab\u4f53\u6062\u590d\u3002";if(t.includes("\u996e\u98df")||t.includes("\u65e9\u9910"))return "\u996e\u98df\u8981\u5c3d\u91cf\u591a\u6837\u5316\uff0c\u4e3b\u98df\u3001\u852c\u83dc\u3001\u6c34\u679c\u3001\u86cb\u5976\u3001\u8c46\u5236\u54c1\u548c\u4f18\u8d28\u86cb\u767d\u90fd\u5f88\u91cd\u8981\u3002";if(t.includes("\u8bfe\u5802")||t.includes("\u603b\u7ed3"))return "\u8fd9\u8282\u8bfe\u7684\u91cd\u70b9\u662f\uff1a\u8ba4\u8bc6\u514d\u75ab\u7cfb\u7edf\u7684\u4fdd\u62a4\u4f5c\u7528\uff0c\u7406\u89e3\u536b\u751f\u4e60\u60ef\u3001\u89c4\u5f8b\u4f5c\u606f\u3001\u5747\u8861\u996e\u98df\u548c\u9002\u91cf\u8fd0\u52a8\u7684\u91cd\u8981\u6027\u3002";return "\u8fd9\u4e2a\u95ee\u9898\u5f88\u6709\u610f\u4e49\u3002\u4e00\u822c\u6765\u8bf4\uff0c\u4fdd\u6301\u5065\u5eb7\u8981\u4ece\u89c4\u5f8b\u4f5c\u606f\u3001\u5747\u8861\u996e\u98df\u3001\u9002\u91cf\u8fd0\u52a8\u548c\u6ce8\u610f\u536b\u751f\u56db\u65b9\u9762\u4e00\u8d77\u505a\u8d77\u3002"}
function go(){const text=q.value.trim();if(!text)return;add("user",text);q.value="";send.disabled=true;typing();setTimeout(()=>{rm();add("ai",reply(text));send.disabled=false;q.focus()},420)}send.onclick=go;q.addEventListener("keydown",e=>{if(e.key==="Enter")go()});addEventListener("load",()=>setTimeout(()=>add("ai",openMsg),300));
</script>
</body>
</html>
